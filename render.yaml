services:
  # ── Headless Telegram bot (Background Worker) ──────────────────────────────
  # Runs the agent 24/7 as a Render Background Worker — no public port needed.
  # The bot communicates via Telegram long-polling (outbound only), so no
  # inbound HTTP is required and a Background Worker is the right Render type.
  #
  # To deploy:
  #   1. Push this repo to GitHub.
  #   2. Create a new Background Worker in Render, point it at this repo.
  #   3. Set the environment variables listed below in the Render dashboard.
  #
  - type: web
    name: deepagents-telegram-bot
    runtime: docker
    # dockerfilePath defaults to ./Dockerfile at repo root — no override needed.
    # startCommand overrides the Dockerfile CMD — leave commented to use the default.
    # startCommand: python deploy/telegram_bot.py
    healthCheckPath: /health

    # ── Disk (REQUIRED for persistent context) ───────────────────────────────
    # Without this disk, the LangGraph checkpointer DB at /root/.deepagents/
    # sessions.db gets wiped on every redeploy — conversation history, cron
    # jobs, and the workspace .venv all disappear. Keep this enabled.
    disk:
      name: deepagents-data
      mountPath: /root/.deepagents
      sizeGB: 1

    # ── Environment variables ─────────────────────────────────────────────────
    # Set SECRET values in the Render dashboard (never commit them here).
    # Non-secret defaults can be listed here with envVarGroups or inline.
    envVars:
      # DA_MODEL is NOT hardcoded — the model router auto-picks the best
      # tool-calling model from available API keys set in Render dashboard.
      # Override: set DA_MODEL in dashboard to force a specific model.
      - key: DA_AUTO_APPROVE
        value: "1"
      # Sandbox mode for filesystem/shell tools.
      #   "none"    — runs in the Render container (shell controlled by DA_ENABLE_SHELL)
      #   "daytona" — per-session ephemeral remote sandbox (requires DAYTONA_API_KEY)
      # When USE_SANDBOX=daytona, shell defaults to enabled (safe in the sandbox).
      - key: USE_SANDBOX
        value: "daytona"
      # Override shell enable explicitly if you want to force it on/off.
      # - key: DA_ENABLE_SHELL
      #   value: "1"
      # LangSmith — set these in the Render dashboard for tracing/dashboard
      # - key: LANGSMITH_API_KEY          (required for tracing)
      # - key: LANGSMITH_PROJECT          (project name, e.g. "deepagents")
      # - key: LANGSMITH_TRACING_V2       (set to "true" to enable)
      # Memory & Database — set in Render dashboard
      # - key: MEM0_API_KEY               (Mem0 semantic memory)
      # - key: ASTRA_DB_API_KEY           (AstraDB structured storage)
      # - key: ASTRA_DB_ENDPOINT          (AstraDB endpoint URL)
      # Ollama — set OLLAMA_BASE_URL and OLLAMA_MODEL in Render dashboard
      # if you have a self-hosted Ollama instance for fast chat.
      # ElevenLabs — set these in the Render dashboard, NOT here
      # - key: ELEVENLABS_API_KEY
      # - key: ELEVEN_LABS_API_KEY
      - key: ELEVENLABS_MODEL
        value: eleven_turbo_v2
      - key: ELEVENLABS_VOICE
        value: pFZP5JQG7iQjIQuC4Bku
      - key: ELEVEN_LABS_VOICE_ID
        value: pFZP5JQG7iQjIQuC4Bku
